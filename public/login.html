<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PetroGuide Pro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">
            <img src="/images/favicon.ico" alt="PetroGuide Pro Logo">
        </div>
        PetroGuide Pro
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue your learning journey</p>

      <div id="alert" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Your password" required>
      </div>

      <button onclick="doLogin()" class="btn btn-primary w-full" id="submitBtn" style="justify-content: center; padding: 0.75rem;">
        Sign In →
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/auth/register">Create one free</a>
      </div>

      <div style="text-align:center; margin-top:1rem;">
        <a href="/" style="font-size:0.8rem; color:var(--text-light);">← Back to home</a>
      </div>
    </div>
  </div>

  <script>
    async function doLogin() {
      const btn = document.getElementById('submitBtn');
      const alertEl = document.getElementById('alert');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alertEl.textContent = 'Please fill in all fields';
        alertEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect;
        } else {
          alertEl.textContent = data.message;
          alertEl.classList.remove('hidden');
          btn.textContent = 'Sign In →';
          btn.disabled = false;
        }
      } catch (err) {
        alertEl.textContent = 'Network error. Please try again.';
        alertEl.classList.remove('hidden');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    }

    // Allow Enter key
    document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  </script>
  <script src="/petroai-widget.js"></script>
</body>
</html>
